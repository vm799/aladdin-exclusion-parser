[pytest]
# Pytest configuration for Aladdin Exclusion Parser

minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode for pytest-asyncio
asyncio_mode = auto

# Markers for test categorization
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    contract: marks tests as API contract tests
    unit: marks tests as unit tests

# Logging
log_cli = false
log_cli_level = INFO
log_level = DEBUG

# Coverage options (for pytest-cov)
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Timeout for tests (seconds)
timeout = 30
